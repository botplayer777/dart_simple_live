name: Personal Build - macOS & Android (No Signing)

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build-mac-android:
    runs-on: macos-latest
    
    steps:
      # 签出代码
      - uses: actions/checkout@v4

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 打开MAC Desktop支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      # 更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 修复 connectivity_plus 插件的 macOS 兼容性问题
      - name: Fix connectivity_plus for macOS
        run: |
          # 找到 connectivity_plus 插件路径
          PLUGIN_PATH="$HOME/.pub-cache/hosted/pub.dev/connectivity_plus-7.1.0/macos/connectivity_plus/Sources/connectivity_plus/PathMonitorConnectivityProvider.swift"
          
          if [ -f "$PLUGIN_PATH" ]; then
            echo "Found connectivity_plus plugin, patching..."
            # 使用 Python 来修复文件（更可靠）
            python3 << 'PYTHON_SCRIPT'
import re

file_path = "$HOME/.pub-cache/hosted/pub.dev/connectivity_plus-7.1.0/macos/connectivity_plus/Sources/connectivity_plus/PathMonitorConnectivityProvider.swift"
file_path = file_path.replace("$HOME", "/Users/runner")

try:
    with open(file_path, 'r') as f:
        content = f.read()
    
    # 删除有问题的 isUltraConstrained 代码块
    # 匹配: if #available(macOS 26.0, *), path.isUltraConstrained { ... }
    pattern = r'if #available\(macOS 26\.0, \*\), path\.isUltraConstrained \{[^}]*\}'
    content = re.sub(pattern, '// Removed isUltraConstrained check for compatibility', content)
    
    with open(file_path, 'w') as f:
        f.write(content)
    
    print("✅ connectivity_plus has been patched successfully")
except Exception as e:
    print(f"⚠️ Failed to patch: {e}")
PYTHON_SCRIPT
          else
            echo "⚠️ connectivity_plus plugin not found at expected path"
            ls -la "$HOME/.pub-cache/hosted/pub.dev/" | grep connectivity || true
          fi

      # ===== Android 构建已注释，专注处理 macOS =====
      # # 修复 build.gradle.kts 以支持无签名配置的构建
      # - name: Fix build.gradle.kts for unsigned build
      #   run: |
      #     cd simple_live_app/android/app
      #     # 使用 perl 进行原地替换（macOS 兼容）
      #     perl -i -pe 's/keyAlias = keystoreProperties\["keyAlias"\] as String/keyAlias = keystoreProperties.getProperty("keyAlias") ?: "debug"/g' build.gradle.kts
      #     perl -i -pe 's/keyPassword = keystoreProperties\["keyPassword"\] as String/keyPassword = keystoreProperties.getProperty("keyPassword") ?: "android"/g' build.gradle.kts
      #     perl -i -pe 's/storePassword = keystoreProperties\["storePassword"\] as String/storePassword = keystoreProperties.getProperty("storePassword") ?: "android"/g' build.gradle.kts

      # # 打包Android APK - 使用 debug 模式完全避开签名配置问题
      # - name: Build Android APK (Debug mode - no signing needed)
      #   run: |
      #     cd simple_live_app
      #     flutter build apk --debug --split-per-abi --verbose

      # # 上传Android APK至Artifacts
      # - name: Upload Android APK to Artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: android-apk
      #     path: |
      #       simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
      #       simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk
      #       simple_live_app/build/app/outputs/flutter-apk/app-x86_64-debug.apk
      #     retention-days: 30

      # 打包macOS (使用原生 flutter build，避免 flutter_distributor 的兼容性问题)
      - name: Build macOS App
        run: |
          cd simple_live_app
          flutter build macos --debug
      
      # 压缩 macOS App
      - name: Create macOS ZIP
        run: |
          cd simple_live_app/build/macos/Build/Products/Debug
          zip -r simple_live_app-macos.zip simple_live_app.app

      # 上传macOS至Artifacts
      - name: Upload macOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: simple_live_app/build/macos/Build/Products/Debug/simple_live_app-macos.zip
          retention-days: 30

      # 完成
      - run: echo "🍏 Build completed successfully!"
