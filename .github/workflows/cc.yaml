name: Personal Build - macOS & Android (No Signing)

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build-mac-android:
    runs-on: macos-latest
    
    steps:
      # 签出代码
      - uses: actions/checkout@v4

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 打开MAC Desktop支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      # 更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 安装appdmg
      - name: Install appdmg
        run: npm install -g appdmg

      # 设置flutter_distributor环境
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      # 打包Android APK - 使用 debug 模式完全避开签名配置问题
      - name: Build Android APK (Debug mode - no signing needed)
        run: |
          cd simple_live_app
          flutter build apk --debug --split-per-abi --verbose

      # 上传Android APK至Artifacts
      - name: Upload Android APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-debug.apk
          retention-days: 30

      # 打包macOS (使用 flutter_distributor)
      - name: Build macOS
        run: |
          cd simple_live_app
          flutter_distributor package --platform macos --targets dmg,zip --skip-clean

      # 上传macOS至Artifacts
      - name: Upload macOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip
          retention-days: 30

      # 完成
      - run: echo "🍏 Build completed successfully!"
