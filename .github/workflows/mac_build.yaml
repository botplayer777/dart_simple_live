name: Build macOS + Android (FIXED)

on:
  workflow_dispatch:

jobs:
  build-mac-android:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"

      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      - name: Fix intl version conflict
        run: |
          cd simple_live_app
          sed -i '' 's/intl: ^0.20.2/intl: 0.19.0/g' pubspec.yaml

      - name: Install dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build Android APK
        run: |
          cd simple_live_app
          flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Build macOS
        run: |
          cd simple_live_app
          flutter build macos --release

      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App
          path: simple_live_app/build/macos/Build/Products/Release
