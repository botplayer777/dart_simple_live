name: Personal Build - macOS & Android (No Signing) v2

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build-mac-android:
    runs-on: macos-latest
    
    steps:
      # 签出代码
      - uses: actions/checkout@v4

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 打开MAC Desktop支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      # 更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 修复 build.gradle.kts - 注释掉自定义签名配置，使用默认签名
      - name: Fix build.gradle.kts to remove custom signing
        run: |
          cd simple_live_app/android/app
          cat > fix_gradle.py << 'EOF'
          import re
          
          with open('build.gradle.kts', 'r', encoding='utf-8') as f:
              content = f.read()
          
          # 1. 注释掉 keystoreProperties 的读取部分
          content = re.sub(
              r'(val keystorePropertiesFile.*?\n.*?keystoreProperties\.load.*?\n.*?\})',
              r'// \1 // Commented out for CI build',
              content,
              flags=re.DOTALL
          )
          
          # 2. 注释掉整个 signingConfigs 块
          content = re.sub(
              r'(signingConfigs\s*\{.*?^\})',
              r'/* \1 */ // Commented out for CI build',
              content,
              flags=re.MULTILINE | re.DOTALL
          )
          
          # 3. 修改 buildTypes release 部分，移除 signingConfig 引用
          content = re.sub(
              r'signingConfig\s*=\s*signingConfigs\.getByName\("release"\)',
              r'// signingConfig = signingConfigs.getByName("debug") // Use default debug signing',
              content
          )
          
          with open('build.gradle.kts', 'w', encoding='utf-8') as f:
              f.write(content)
          
          print("✅ build.gradle.kts has been fixed for CI build")
          EOF
          
          python3 fix_gradle.py
          
          # 显示修改后的关键部分
          echo "=== Modified build.gradle.kts (signing section) ==="
          grep -B2 -A5 "keystoreProperties" build.gradle.kts || echo "keystoreProperties section commented out"

      # 安装appdmg
      - name: Install appdmg
        run: npm install -g appdmg

      # 设置flutter_distributor环境
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      # 打包Android APK
      - name: Build Android APK
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi

      # 上传Android APK至Artifacts
      - name: Upload Android APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

      # 打包macOS (使用 flutter_distributor)
      - name: Build macOS
        run: |
          cd simple_live_app
          flutter_distributor package --platform macos --targets dmg,zip --skip-clean

      # 上传macOS至Artifacts
      - name: Upload macOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip
          retention-days: 30

      # 完成
      - run: echo "🍏 Build completed successfully!"
